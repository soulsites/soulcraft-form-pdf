name: Create Release ZIP

on:
  release:
    types: [published, created, released]
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Debug Info
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Event type: ${{ github.event.action }}"
          echo "Reference: ${{ github.ref }}"

      - name: Create ZIP
        run: |
          mkdir -p build/soulcraft-form-pdf
          cp -r * build/soulcraft-form-pdf/ || true
          rm -rf build/soulcraft-form-pdf/.git build/soulcraft-form-pdf/.github build/soulcraft-form-pdf/build
          cd build
          zip -r ../soulcraft-form-pdf.zip soulcraft-form-pdf
          cd ..

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: soulcraft-form-pdf.zip
