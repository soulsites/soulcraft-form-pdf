name: Create Release ZIP

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    
    - name: Create ZIP
      run: |
        zip -r soulcraft-form-pdf.zip . -x ".git/*" ".github/*"
        
    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      with:
        files: soulcraft-form-pdf.zip
