name: Create Release ZIP
on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Prepare plugin folder
        run: |
          # Erstelle den Hauptordner mit festem Namen
          mkdir -p release/soulcraft-form-pdf
          
          # Kopiere alle Dateien außer `.git` und `.github` in diesen Ordner
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.gitignore' \
            --exclude='README.md' \
            . release/soulcraft-form-pdf

      - name: Create ZIP file
        run: |
          cd release
          zip -r ../soulcraft-form-pdf.zip soulcraft-form-pdf
          
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.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 }}
        with:
          files: soulcraft-form-pdf.zip
