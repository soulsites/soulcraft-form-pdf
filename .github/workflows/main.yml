name: Create Release ZIP
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.1)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer

      - name: Install Composer dependencies (no dev)
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Prepare plugin folder
        run: |
          mkdir -p release/soulcraft-form-pdf

          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.idea' \
            --exclude='node_modules' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            --exclude='README.md' \
            --exclude='composer.lock' \
            . release/soulcraft-form-pdf

      - name: Create ZIP file
        run: |
          cd release
          zip -r ../soulcraft-form-pdf.zip soulcraft-form-pdf

      - name: Create Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          draft: false
          prerelease: false
          files: soulcraft-form-pdf.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
